{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora AI — Login</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'nexora_ai/img/favicon.svg' %}"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: rgba(15,15,25,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 0 30px rgba(124,58,237,0.4);
    }
    .logo-icon img { width: 100%; height: 100%; display: block; }
    .logo h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .logo h1 span { background: linear-gradient(90deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo p { color: #64748b; font-size: 14px; margin-top: 4px; }

    .messages { margin-bottom: 16px; }
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      border: 1px solid;
    }
    .alert-error { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: #86efac; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }

    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .divider { text-align: center; color: #334155; font-size: 13px; margin: 20px 0; position: relative; }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .link-row { text-align: center; font-size: 14px; color: #64748b; }
    .link-row a { color: #7c3aed; text-decoration: none; font-weight: 500; }
    .link-row a:hover { color: #9d63f5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><img src="{% static 'nexora_ai/img/logo.svg' %}" alt="Nexora AI"/></div>
      <h1><span>Nexora</span> AI</h1>
      <p>Welcome back — sign in to continue</p>
    </div>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <div class="divider">or</div>

    <div class="link-row">
      Don't have an account? <a href="{% url 'signup' %}">Create one</a>
    </div>
  </div>
</body>
</html>
